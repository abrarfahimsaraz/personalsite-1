    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load. Swapped preload->stylesheet by the CSP-hashed bootstrap
         script below (no inline onload attribute, so a strict CSP needs no unsafe-hashes). -->
    <!-- Inter (body) + Space Grotesk (display) — premium modern product-grade pairing -->
    <link
      id="font-css"
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" />
    </noscript>

    <!-- GSAP + ScrollTrigger (scroll-reveal + entrance animations) -->
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script defer src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <!-- Preload the LCP hero portrait (AVIF primary, WebP fallback handled by <picture>) -->
    <link
      rel="preload"
      as="image"
      href="/landing-320.avif"
      type="image/avif"
      media="(min-width: 1024px)"
      imagesrcset="/landing-240.avif 240w, /landing-320.avif 320w, /landing-480.avif 480w, /landing-640.avif 640w, /landing-800.avif 800w, /landing-960.avif 960w"
      imagesizes="(min-width: 1024px) 320px, 100vw"
      fetchpriority="high"
    />
  </head>

  <body>
    <noscript>Abrar Fahim — AI Researcher and Data Scientist. Please enable JavaScript to view this portfolio.</noscript>
    <script>
      // Light is the default; opt into dark only when explicitly saved.
      if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
      }
      // Pre-hide reveal targets only when motion is allowed; GSAP fades them in.
      try {
        if (!window.matchMedia("(prefers-reduced-motion: reduce)").matches) {
          document.documentElement.classList.add("gsap-enabled");
        }
      } catch (e) {}
      // Non-blocking font swap (moved off the link's inline onload for a strict CSP).
      // The preload already started the fetch; flipping rel->stylesheet after the
      // initial parse applies it without blocking first paint. A setTimeout fallback
      // guarantees the swap even in backgrounded tabs (where rAF is throttled).
      (function () {
        var l = document.getElementById("font-css");
        if (!l || l.rel === "stylesheet") return;
        var swap = function () { if (l.rel !== "stylesheet") l.rel = "stylesheet"; };
        l.addEventListener("load", swap, { once: true });
        window.addEventListener("load", swap, { once: true });
        setTimeout(swap, 0);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
