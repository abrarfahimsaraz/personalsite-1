<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1a2332" />
    <link rel="icon" type="image/x-icon" href="/newlogo.ico" />
    <title>Abrar Fahim — AI Researcher & Data Scientist</title>
    <meta name="description" content="Academic portfolio of Abrar Fahim — B.Sc. EEE graduate from IUT specializing in AI, deep learning, power systems optimization, and medical imaging research." />
    <meta name="author" content="Abrar Fahim" />
    <meta name="keywords" content="Abrar Fahim, AI researcher, data scientist, deep learning, power systems, medical imaging, IUT, Bangladesh" />
    <!-- Canonical, OG and Twitter tags are emitted per-route by react-helmet-async (src/components/SEO.tsx). -->
    <!-- Static defaults below are kept for non-JS scrapers (Facebook/LinkedIn) that fetch the initial HTML. -->

    <meta property="og:title" content="Abrar Fahim — AI Researcher & Data Scientist" />
    <meta property="og:description" content="Academic portfolio of Abrar Fahim showcasing research in AI, power systems, and medical imaging." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://abrarfahim.site/" />
    <meta property="og:site_name" content="Abrar Fahim" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:image" content="https://abrarfahim.site/abrar-fahim-800.jpg" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="1067" />
    <meta property="og:image:alt" content="Abrar Fahim — AI Researcher and Data Scientist" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Abrar Fahim — AI Researcher & Data Scientist" />
    <meta name="twitter:description" content="Academic portfolio of Abrar Fahim showcasing research in AI, power systems, and medical imaging." />
    <meta name="twitter:image" content="https://abrarfahim.site/abrar-fahim-800.jpg" />
    <meta name="twitter:image:alt" content="Abrar Fahim — AI Researcher and Data Scientist" />

    <!-- Static JSON-LD for crawlers that don't execute JS -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Person",
      "name": "Abrar Fahim",
      "givenName": "Abrar",
      "familyName": "Fahim",
      "url": "https://abrarfahim.site",
      "image": "https://abrarfahim.site/abrar-fahim-800.jpg",
      "jobTitle": "AI Researcher & Data Scientist",
      "email": "abrarfahim8@iut-dhaka.edu",
      "address": { "@type": "PostalAddress", "addressLocality": "Dhaka", "addressCountry": "BD" },
      "alumniOf": { "@type": "CollegeOrUniversity", "name": "Islamic University of Technology" },
      "sameAs": [
        "https://github.com/abrarfahimsaraz",
        "https://linkedin.com/in/abrarfahimsaraz",
        "https://scholar.google.com/citations?user=9bB_FXAAAAAJ&hl=en"
      ],
      "knowsAbout": ["Artificial Intelligence", "Deep Learning", "Medical Image Analysis", "Power Systems Optimization", "Machine Learning", "Data Science"]
    }
    </script>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Non-blocking font load: fetched as print, then swapped to all on load. JS-less fallback below. -->
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" />
    </noscript>

    <!-- Preload the LCP hero portrait (AVIF primary, WebP fallback handled by <picture>) -->
    <link
      rel="preload"
      as="image"
      href="/abrar-fahim-320.avif"
      type="image/avif"
      imagesrcset="/abrar-fahim-240.avif 240w, /abrar-fahim-320.avif 320w, /abrar-fahim-480.avif 480w, /abrar-fahim-640.avif 640w"
      imagesizes="(min-width: 1024px) 320px, 100vw"
      fetchpriority="high"
    />
  </head>

  <body>
    <noscript>Abrar Fahim — AI Researcher and Data Scientist. Please enable JavaScript to view this portfolio.</noscript>
    <script>
      // Apply saved theme before first paint to prevent flash
      if (localStorage.getItem("theme") === "light") {
        document.documentElement.classList.remove("dark");
      }
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
